# =============================================================
#  Nginx Virtual Host Configuration — Worobi.com Family Sites
#  Place this file in /etc/nginx/sites-available/worobi.com
#  Then symlink: ln -s /etc/nginx/sites-available/worobi.com /etc/nginx/sites-enabled/
#  Test config:  sudo nginx -t
#  Reload:       sudo systemctl reload nginx
# =============================================================
#
#  ASSUMED DIRECTORY STRUCTURE on your VPS:
#
#  /var/www/
#  ├── worobi.com/           ← main site (index.html)
#  ├── brandon.worobi.com/   ← brandon/index.html copied here
#  ├── monica.worobi.com/
#  ├── nevaeh.worobi.com/
#  ├── alexander.worobi.com/
#  ├── lilian.worobi.com/
#  ├── theodore.worobi.com/
#  ├── jefferson.worobi.com/
#  └── charlotte.worobi.com/
#
#  Each subdomain folder gets its own subfolder's contents.
#  e.g. copy the contents of /brandon/ → /var/www/brandon.worobi.com/
# =============================================================

# ── Redirect bare HTTP → HTTPS (all domains) ──────────────────
server {
    listen 80;
    server_name worobi.com www.worobi.com
                brandon.worobi.com
                monica.worobi.com
                nevaeh.worobi.com
                alexander.worobi.com
                lilian.worobi.com
                theodore.worobi.com
                jefferson.worobi.com
                charlotte.worobi.com
                notary.worobi.com;

    return 301 https://$host$request_uri;
}

# ── Main site: worobi.com ─────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name worobi.com www.worobi.com;

    root /var/www/worobi.com;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/worobi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/worobi.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Redirect www → non-www
    if ($host = www.worobi.com) {
        return 301 https://worobi.com$request_uri;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}

